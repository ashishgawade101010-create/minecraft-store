<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McBlueFlame Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🔥 McBlueFlame Store 🔥</h1>
<p class="subtitle">Premium Minecraft Ranks</p>

<div class="cards">

<div class="card">
<h2>💎 VIP</h2>
<p>Price: Coming Soon</p>
<button>Buy</button>
</div>

<div class="card">
<h2>👑 MVP</h2>
<p>Price: Coming Soon</p>
<button>Buy</button>
</div>

<div class="card">
<h2>⚡ Legend</h2>
<p>Price: Coming Soon</p>
<button>Buy</button>
</div>

<div class="card">
<h2>🔥 Elite</h2>
<p>Price: Coming Soon</p>
<button>Buy</button>
</div>

<div class="card">
<h2>🌟 Titan</h2>
<p>Price: Coming Soon</p>
<button>Buy</button>
</div>

</div>

<h2>Google Pay</h2>

<img src="qr.png" alt="QR Code" class="qr">

<input type="text" placeholder="Minecraft Username">

<select>
<option>VIP</option>
<option>MVP</option>
<option>Legend</option>
<option>Elite</option>
<option>Titan</option>
</select>

<input type="text" placeholder="Transaction ID">

<button class="buy">Submit Order</button>

</div>

</body>
</html>
