<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>McBlueFlame Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔥 McBlueFlame Store 🔥</h1>

    <h2>Buy Ranks</h2>

    <div class="rank">💎 VIP - ₹Coming Soon</div>
    <div class="rank">👑 MVP - ₹Coming Soon</div>
    <div class="rank">⚡ Legend - ₹Coming Soon</div>
    <div class="rank">🔥 Elite - ₹Coming Soon</div>
    <div class="rank">🌟 Titan - ₹Coming Soon</div>

    <h2>Scan to Pay</h2>

    <img src="qr.png" width="250" alt="Google Pay QR">

    <br><br>

    <input type="text" placeholder="Minecraft Username">

    <br><br>

    <select>
        <option>VIP</option>
        <option>MVP</option>
        <option>Legend</option>
        <option>Elite</option>
        <option>Titan</option>
    </select>

    <br><br>

    <input type="text" placeholder="Transaction ID">

    <br><br>

    <button>Submit Order</button>

</div>

</body>
</html>
