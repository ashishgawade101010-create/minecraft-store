<!DOCTYPE html>
<html>
<head>
    <title>Minecraft Rank Store</title>
</head>
<body>

    <h1>Minecraft Rank Store</h1>

    <h2>Available Ranks</h2>
    <ul>
        <li>VIP</li>
        <li>MVP</li>
        <li>Legend</li>
        <li>Elite</li>
        <li>Titan</li>
    </ul>

    <h2>Pay with Google Pay</h2>
    <img src="qr.png" width="250" alt="Google Pay QR Code">

    <h2>Buy a Rank</h2>

    <p>Minecraft Username:</p>
    <input type="text" placeholder="Enter username">

    <p>Select Rank:</p>
    <select>
        <option>VIP</option>
        <option>MVP</option>
        <option>Legend</option>
        <option>Elite</option>
        <option>Titan</option>
    </select>

    <p>Transaction ID:</p>
    <input type="text" placeholder="Enter transaction ID">

    <br><br>

    <button>Submit Order</button>

</body>
</html>
